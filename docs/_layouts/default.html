<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta property="og:title" content="{{ page.title | default: site.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:image" content="https://jakobkreft.github.io/synchi/assets/img/og-banner.png" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    <link rel="icon" href="/assets/favicon/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/assets/favicon/favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/assets/favicon/favicon-16x16.png" sizes="16x16" type="image/png">
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico">

  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="branding">
          <a href="{{ '/' | relative_url }}" class="logo-link">
            <img src="{{ '/assets/img/logo.svg' | relative_url }}" alt="{{ site.title }} logo" class="logo" />
          </a>
          <div class="title-block">
            <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
            <p class="tagline">{{ site.description }}</p>
            <nav>
              <a href="{{ '/' | relative_url }}">Home</a>
              <a href="{{ '/installation.html' | relative_url }}">Install</a>
              <a href="{{ '/configuration.html' | relative_url }}">Config</a>
              <a href="{{ '/troubleshooting.html' | relative_url }}">Support</a>
              <a href="{{ site.github.repository_url }}">GitHub</a>
            </nav>
            <div class="search">
              <label for="site-search" class="sr-only">Search</label>
              <input
                type="search"
                id="site-search"
                placeholder="Search documentation..."
                autocomplete="off"
              />
              <div id="search-results" class="search-results" hidden></div>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main class="container">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="container">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} &middot; <a href="{{ site.github.repository_url }}">View on GitHub</a></p>
      </div>
    </footer>
    <script>
      const pages = [
        {%- for p in site.pages -%}
        {%- if p.title and p.layout == "default" -%}
        {
          "title": {{ p.title | jsonify }},
          "url": {{ p.url | relative_url | jsonify }},
          "content": {{ p.content | strip_html | normalize_whitespace | jsonify }}
        }{% unless forloop.last %},{% endunless %}
        {%- endif -%}
        {%- endfor -%}
      ];

      const input = document.getElementById("site-search");
      const resultsEl = document.getElementById("search-results");

      function renderResults(matches) {
        if (!matches.length) {
          resultsEl.innerHTML = "<p>No results.</p>";
          resultsEl.hidden = false;
          return;
        }
        const items = matches
          .map(
            (m) =>
              `<div class="result"><a href="${m.url}">${m.title}</a><p>${m.snippet}</p></div>`
          )
          .join("");
        resultsEl.innerHTML = items;
        resultsEl.hidden = false;
      }

      input?.addEventListener("input", (event) => {
        const query = event.target.value.trim().toLowerCase();
        if (!query) {
          resultsEl.hidden = true;
          resultsEl.innerHTML = "";
          return;
        }
        const matches = pages
          .map((page) => {
            const content = page.content.toLowerCase();
            const idx = content.indexOf(query);
            if (idx === -1 && !page.title.toLowerCase().includes(query)) {
              return null;
            }
            const snippetStart = Math.max(0, idx - 40);
            const snippet = page.content
              .substring(snippetStart, snippetStart + 160)
              .replace(/\s+/g, " ");
            return {
              title: page.title,
              url: page.url,
              snippet: snippet || page.content.slice(0, 120),
            };
          })
          .filter(Boolean)
          .slice(0, 6);
        renderResults(matches);
      });
    </script>
    <script data-goatcounter="https://jakobkreft.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
